# ============================================================
# OutbreakLens — Docker Compose
# ============================================================
# Services:
#   1. PostgreSQL  — metadata DB for Airflow + data warehouse
#   2. MinIO       — S3-compatible object storage (bronze/silver/gold)
#   3. Airflow     — orchestration (webserver + scheduler)
#   4. Qdrant      — vector database (Phase 2, but spinning up now)
# ============================================================

x-airflow-common: &airflow-common
  # ----------------------------------------------------------
  # This is a YAML anchor — a reusable template.
  # Both the airflow-webserver and airflow-scheduler share
  # the same image, env vars, and volume mounts.
  # Instead of duplicating config, we define it once here
  # and reference it with "<<: *airflow-common" below.
  # ----------------------------------------------------------
  build:
    context: .
    dockerfile: Dockerfile.airflow
  mem_limit: 4g
  environment:
    # Tells Airflow to use PostgreSQL instead of default SQLite
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://outbreaklens:outbreaklens123@postgres:5432/airflow
    # LocalExecutor runs tasks in the same container (good for dev)
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    # Don't load Airflow's example DAGs — keeps the UI clean
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    # Secret keys for encryption and web session security
    AIRFLOW__CORE__FERNET_KEY: "d2VhcmVidWlsZGluZ291dGJyZWFrbGVucw=="
    AIRFLOW__WEBSERVER__SECRET_KEY: "outbreaklens-secret-key"
    # MinIO connection info (so DAGs can read/write to object storage)
    MINIO_ENDPOINT: minio:9000
    MINIO_ROOT_USER: outbreaklens
    MINIO_ROOT_PASSWORD: outbreaklens123
    # PostgreSQL connection info (so DAGs can read/write to warehouse)
    POSTGRES_USER: outbreaklens
    POSTGRES_PASSWORD: outbreaklens123
    POSTGRES_DB: outbreaklens
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
  volumes:
    # Mount your local DAGs folder into the container so Airflow
    # picks up your pipeline code without rebuilding the image.
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    # Mount ingestion scripts so DAGs can import them
    - ./ingestion:/opt/airflow/ingestion
  networks:
    - outbreaklens-net
  depends_on:
    postgres:
      condition: service_healthy


services:
  # ──────────────────────────────────────────────────────────
  # 1. POSTGRESQL
  # ──────────────────────────────────────────────────────────
  # Two databases will live here:
  #   - "airflow"       → Airflow's internal metadata
  #   - "outbreaklens"  → our data warehouse (silver + gold tables)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: outbreaklens
      POSTGRES_PASSWORD: outbreaklens123
      POSTGRES_DB: airflow
    volumes:
      # Persist database data across container restarts
      - postgres-data:/var/lib/postgresql/data
      # This init script runs once on first startup to create
      # the outbreaklens warehouse database alongside the airflow DB
      - ./docker-init/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      # Access PostgreSQL from your Mac at localhost:5432
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outbreaklens -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outbreaklens-net

  # ──────────────────────────────────────────────────────────
  # 2. MINIO (Object Storage)
  # ──────────────────────────────────────────────────────────
  # Acts like AWS S3 but runs locally. We'll create 3 buckets:
  #   - bronze  → raw data as ingested
  #   - silver  → cleaned and normalized
  #   - gold    → analytics-ready tables
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: outbreaklens
      MINIO_ROOT_PASSWORD: outbreaklens123
    volumes:
      - minio-data:/data
    ports:
      # 9000 = S3 API endpoint (your code connects here)
      - "9000:9000"
      # 9001 = Web console (nice UI to browse files)
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - outbreaklens-net

  # ──────────────────────────────────────────────────────────
  # MinIO Bucket Setup (runs once, then exits)
  # ──────────────────────────────────────────────────────────
  # This is a helper container. It starts, creates the three
  # buckets we need, and then stops. It only runs commands
  # — it doesn't stay running like the other services.
  # ──────────────────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 outbreaklens outbreaklens123;
      mc mb local/bronze --ignore-existing;
      mc mb local/silver --ignore-existing;
      mc mb local/gold --ignore-existing;
      echo 'Buckets created successfully!';
      exit 0;
      "
    networks:
      - outbreaklens-net

  # ──────────────────────────────────────────────────────────
  # 3. AIRFLOW — Init (runs DB migrations, then exits)
  # ──────────────────────────────────────────────────────────
  # First-time setup: creates Airflow's internal tables in
  # PostgreSQL and creates an admin user for the web UI.
  # ──────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash -c
    command:
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@outbreaklens.io &&
        echo 'Airflow init complete!'
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # 3a. AIRFLOW — Webserver (the UI you interact with)
  # ──────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      # Access Airflow UI at http://localhost:8080
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ──────────────────────────────────────────────────────────
  # 3b. AIRFLOW — Scheduler (triggers your DAGs on schedule)
  # ──────────────────────────────────────────────────────────
  # The scheduler watches your DAG files and runs tasks
  # at the intervals you define. Without this, nothing executes.
  # ──────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ──────────────────────────────────────────────────────────
  # 4. QDRANT (Vector Database — Phase 2)
  # ──────────────────────────────────────────────────────────
  # Setting it up now so the infrastructure is ready.
  # Qdrant stores vector embeddings for semantic search.
  # ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      # 6333 = REST API
      - "6333:6333"
      # 6334 = gRPC API (faster, used by Python client)
      - "6334:6334"
    networks:
      - outbreaklens-net


# ──────────────────────────────────────────────────────────
# VOLUMES — Persistent storage that survives container restarts
# ──────────────────────────────────────────────────────────
volumes:
  postgres-data:
  minio-data:
  qdrant-data:


# ──────────────────────────────────────────────────────────
# NETWORKS — Private network for inter-container communication
# ──────────────────────────────────────────────────────────
networks:
  outbreaklens-net:
    driver: bridge